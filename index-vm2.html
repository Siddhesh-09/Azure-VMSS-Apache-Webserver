<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Core | Node Bravo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a0033; font-family: 'Inter', sans-serif; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .ui-layer { 
            position: relative; z-index: 10; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            pointer-events: none; color: white; text-align: center;
        }
        .node-id { font-family: 'Orbitron', sans-serif; font-size: 6rem; color: #e0b0ff; text-shadow: 0 0 20px rgba(224,176,255,0.8); margin: 0; }
        .region-tag { font-size: 1.2rem; letter-spacing: 5px; opacity: 0.7; border: 1px solid #e0b0ff; padding: 10px 30px; border-radius: 50px; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="ui-layer">
        <p style="letter-spacing: 8px;">FAILOVER CHANNEL 03</p>
        <h1 class="node-id">INSTANCE 02</h1>
        <div class="region-tag">REGION: Central-India-Zone-03</div> //You can change thisinfo according to you
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 8 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.color = 'rgba(224, 176, 255, 0.6)';
            }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.size > 0.1) this.size -= 0.05; }
            draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }

        window.addEventListener('mousemove', (e) => {
            particles.push(new Particle(e.x, e.y));
        });

        function animate() {
            ctx.fillStyle = 'rgba(26, 0, 51, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].size <= 0.1) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
