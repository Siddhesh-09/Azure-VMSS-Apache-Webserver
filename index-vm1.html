<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Core | Node Alpha</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000428; font-family: 'Inter', sans-serif; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .ui-layer { 
            position: relative; z-index: 10; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            pointer-events: none; color: white; text-align: center;
        }
        .node-id { font-family: 'Orbitron', sans-serif; font-size: 6rem; color: #00d2ff; text-shadow: 0 0 20px rgba(0,210,255,0.8); margin: 0; }
        .region-tag { font-size: 1.2rem; letter-spacing: 5px; opacity: 0.7; border: 1px solid #00d2ff; padding: 10px 30px; border-radius: 50px; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="ui-layer">
        <p style="letter-spacing: 8px;">ENCRYPTED CHANNEL 01</p>
        <h1 class="node-id">INSTANCE 01</h1>
        <div class="region-tag">REGION: EAST-US-01</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = '#00d2ff';
            }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.size > 0.2) this.size -= 0.1; }
            draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 5; i++) { particles.push(new Particle(e.x, e.y)); }
        });

        function animate() {
            ctx.fillStyle = 'rgba(0, 4, 40, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].size <= 0.2) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
